{% extends "base.html" %}

{% block title %}Password Updated | Splicing Tracker{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 text-center">
    <div class="bg-white p-10 rounded-2xl shadow-xl border border-gray-200">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-4xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Success!</h2>
        <p class="text-gray-500 mb-8">Your password has been updated successfully.</p>
        
        <a href="{% url 'custom_dashboard_redirect' %}" class="inline-block w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded-xl shadow-lg transition-all">
            RETURN TO DASHBOARD
        </a>
    </div>
</div>
{% endblock %}
